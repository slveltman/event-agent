<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slimme Event Planner</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎉 Slimme Event Planner</h1>
            <p>Plan je evenement met hulp van AI - budgetbewust en weersbestendig</p>
        </header>

        <main>
            <!-- Input Formulier -->
            <section class="form-section">
                <h2>Event Details</h2>
                <form id="event-form">
                    <div class="form-group">
                        <label for="guests">Aantal Gasten</label>
                        <input type="number" id="guests" min="1" placeholder="bijv. 50" required>
                    </div>

                    <div class="form-group">
                        <label for="date">Datum Evenement</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label for="budget">Budget (€)</label>
                        <input type="number" id="budget" min="0" step="0.01" placeholder="bijv. 2500" required>
                    </div>

                    <div class="form-group">
                        <label for="location">Locatie (binnen/buiten)</label>
                        <select id="location" required>
                            <option value="">Kies locatietype...</option>
                            <option value="indoor">🏢 Binnen (Zaal/Restaurant)</option>
                            <option value="outdoor">🌳 Buiten (Tuin/Park)</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn">💡 Krijg Advies</button>
                </form>
            </section>

            <!-- Chat/Response Area -->
            <section class="chat-section">
                <h2>Agent Advies</h2>
                <div id="chat-container" class="chat-container"></div>

                <div id="input-area" class="follow-up-area">
                    <input type="text" id="chat-input" placeholder="Stel een vervolgvraag...">
                    <button id="send-btn">Verstuur</button>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
